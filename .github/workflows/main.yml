name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite rodar manualmente pelo site do GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Baixa o código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Java 17 (exigido pelo Gradle / Android SDK)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 4. Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Instala dependências npm
      - name: Install dependencies
        run: npm ci

      # 6. Build do app web (gera a pasta dist/)
      - name: Build web
        run: npm run build

      # 7. Adiciona a plataforma Android (só na primeira vez — ignora se já existir)
      - name: Add Android platform
        run: npx cap add android || true

      # 8. Instala plugin de Health Connect
      - name: Install Health Connect plugin
        run: npm i capacitor-health-connect

      # 9. Copia o build web + sincroniza plugins no projeto nativo
      - name: Capacitor sync
        run: npx cap sync android

      # 10. Permissões de execução para o Gradle wrapper
      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      # 11. Compila o APK de debug (sem precisar de keystore)
      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      # 12. Salva o APK como artefato para download
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ASCEND-debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
