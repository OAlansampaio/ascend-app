name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix project structure
        run: |
          mkdir -p src/services
          [ -f App.jsx ] && mv App.jsx src/App.jsx && echo "Moved App.jsx -> src/"
          [ -f main.jsx ] && mv main.jsx src/main.jsx && echo "Moved main.jsx -> src/"
          for f in storage.js notifications.js health.js strava.js; do
            [ -f "$f" ] && mv "$f" "src/services/$f" && echo "Moved $f -> src/services/"
          done
          echo "=== Estrutura final ===" && find . -not -path './.git/*' -not -path './node_modules/*' | sort

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Install Health Connect plugin
        run: npm install capacitor-health-connect --legacy-peer-deps

      - name: Capacitor sync
        run: |
          npm install -D typescript
          npx cap sync android

      - name: Grant Gradle permission
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ASCEND-debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
